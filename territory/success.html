<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Mulchman Nation — Subscription Active</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:#fff;color:#0d2244;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
    .success-card{max-width:520px;width:100%;text-align:center;padding:48px 40px;border-top:3px solid #c41f2e;background:#f5f7fa}
    .success-icon{font-size:4rem;color:#2a9d5c;margin-bottom:16px;line-height:1}
    h1{font-size:1.6rem;font-weight:800;color:#0d2244;letter-spacing:-0.01em;margin:0 0 12px}
    p{color:#4a5d70;line-height:1.6;margin:0 0 12px;font-size:0.95rem}
    .cta{display:inline-block;background:#c41f2e;color:#fff;padding:14px 32px;text-decoration:none;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;font-size:0.85rem;margin-top:24px;transition:background 150ms}
    .cta:hover{background:#a41826}
  </style>
</head>
<body>
  <div class="success-card">
    <div class="success-icon">✓</div>
    <h1>Welcome to Mulchman Nation!</h1>
    <p>Your subscription is active. We'll start forwarding leads from your territories to your phone number right away.</p>
    <p>Check your email for the receipt and confirmation details.</p>
    <a href="/" class="cta">Back to Home</a>
  </div>
</body>
</html>
